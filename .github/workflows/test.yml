name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable + dev deps)
        run: |
          cd packages/python
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          cd packages/python
          python -m pytest tests/ -v

      - name: Verify data sync
        run: |
          bash scripts/sync.sh
          # 若 sync 脚本改动了任何文件, 说明 data/ 没跟上 source-of-truth
          if ! git diff --quiet; then
            echo "✗ data/ 目录未与仓库根同步, 请在本地跑 scripts/sync.sh 再提交"
            git diff --stat
            exit 1
          fi

  smoke:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          cd packages/python
          pip install -e .

      - name: End-to-end enable → review → disable
        run: |
          mkdir -p /tmp/sw-ci && cd /tmp/sw-ci
          star-word --version
          star-word verify
          star-word enable claude-code
          test -f CLAUDE.md
          test -f .star-word/RULES.md
          grep -q "star-word:begin" CLAUDE.md
          echo "值得注意的是，稳稳接住流量。" > dirty.md
          if star-word review dirty.md; then
            echo "✗ review 应返回非 0 退出码"
            exit 1
          fi
          star-word disable claude-code
          test ! -d .star-word
