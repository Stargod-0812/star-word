name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable + dev deps)
        run: |
          cd packages/python
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          cd packages/python
          python -m pytest tests/ -v

      - name: Verify rules.yaml → artifacts drift-free
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python3 scripts/build.py --check

      - name: Verify built packages include rules.yaml
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python -m pip install build
          python -m build packages/python --sdist --wheel --outdir /tmp/star-word-dist
          python3 - <<'PY'
          import glob
          import tarfile
          import zipfile

          wheel = glob.glob("/tmp/star-word-dist/*.whl")
          sdist = glob.glob("/tmp/star-word-dist/*.tar.gz")
          assert wheel and sdist, "missing wheel or sdist artifact"

          with zipfile.ZipFile(wheel[0]) as zf:
              assert any(name.endswith("star_word/data/rules.yaml") for name in zf.namelist())

          with tarfile.open(sdist[0], "r:gz") as tf:
              assert any(name.endswith("star_word/data/rules.yaml") for name in tf.getnames())
          PY

  smoke:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          cd packages/python
          pip install -e .

      - name: End-to-end enable → review → disable
        run: |
          mkdir -p /tmp/sw-ci && cd /tmp/sw-ci
          star-word --version
          star-word handshake
          star-word surfaces
          star-word enable claude-code
          test -f CLAUDE.md
          test -f .sw/rules.md
          test -f .sw/claude.md
          grep -q "sw-managed-begin" CLAUDE.md
          grep -q "@.sw/claude.md" CLAUDE.md
          echo "值得注意的是，稳稳接住流量。" > dirty.md
          if star-word review dirty.md; then
            echo "✗ review 应返回非 0 退出码"
            exit 1
          fi
          star-word disable claude-code
          test ! -d .sw
